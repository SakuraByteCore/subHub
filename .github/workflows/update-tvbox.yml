name: Update TVBox subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build subscription
        run: python3 scripts/build_tvbox.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tvbox.json manifest.json
          git commit -m "chore(subscription): update generated tvbox config"
          git push

      - name: Purge jsDelivr cache
        run: |
          set -euo pipefail
          for url in \
            https://purge.jsdelivr.net/gh/SakuraByteCore/subHub/tvbox.json \
            https://purge.jsdelivr.net/gh/SakuraByteCore/subHub/lib/subhub_notice.js \
            https://purge.jsdelivr.net/gh/SakuraByteCore/subHub@main/tvbox.json \
            https://purge.jsdelivr.net/gh/SakuraByteCore/subHub@main/lib/subhub_notice.js
          do
            echo "Purging $url"
            curl --fail --silent --show-error --retry 3 --retry-delay 2 "$url" || echo "::warning::Failed to purge $url"
            echo
          done
