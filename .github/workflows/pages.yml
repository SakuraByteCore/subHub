name: Publish GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tvbox.json
      - manifest.json
      - lib/**
      - public/**
      - scripts/**
      - sources.json
      - .github/workflows/pages.yml

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build subscription
        run: python3 scripts/build_tvbox.py

      - name: Prepare static site
        run: |
          set -euo pipefail
          rm -rf /tmp/subhub-pages
          mkdir -p /tmp/subhub-pages/lib
          cp public/index.html /tmp/subhub-pages/index.html
          touch /tmp/subhub-pages/.nojekyll
          cp tvbox.json /tmp/subhub-pages/tvbox.json
          cp manifest.json /tmp/subhub-pages/manifest.json
          cp lib/subhub_notice.js /tmp/subhub-pages/lib/subhub_notice.js

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/subhub-gh-pages
          git clone --branch gh-pages --single-branch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/subhub-gh-pages
          rsync -a --delete --exclude .git /tmp/subhub-pages/ /tmp/subhub-gh-pages/
          cd /tmp/subhub-gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi
          git commit -m "chore(pages): publish static subscription files"
          git push origin gh-pages
