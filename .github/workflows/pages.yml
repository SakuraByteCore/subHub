name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tvbox.json
      - manifest.json
      - lib/**
      - public/**
      - scripts/**
      - sources.json
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build subscription
        run: python3 scripts/build_tvbox.py

      - name: Prepare static site
        run: |
          set -euo pipefail
          mkdir -p public/lib
          cp tvbox.json public/tvbox.json
          cp manifest.json public/manifest.json
          cp lib/subhub_notice.js public/lib/subhub_notice.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
